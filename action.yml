name: Install Octave
description: Installs Octave for the given platform type.

inputs:
  install-type:
    description: 'Platform install type: ubuntu, macos, windows, or ubuntu-flatpak'
    required: true

runs:
  using: composite
  steps:
    - name: Install octave (ubuntu)
      if: inputs.install-type == 'ubuntu'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y octave gnuplot

    - name: Install octave (macos)
      if: inputs.install-type == 'macos'
      shell: bash
      run: brew install octave

    - name: Install Octave (windows)
      if: inputs.install-type == 'windows'
      shell: pwsh
      run: |
        winget install --id GNU.Octave -e --silent --accept-source-agreements --accept-package-agreements
        Write-Host "=== C:\Program Files\GNU Octave ==="
        Get-ChildItem "C:\Program Files\GNU Octave" -ErrorAction SilentlyContinue
        Write-Host "=== Searching all drives for octave-cli.exe ==="
        Get-ChildItem "C:\", "D:\" -Filter "octave-cli.exe" -Recurse -Depth 6 -ErrorAction SilentlyContinue
        # echo "Octave found at: $octaveBin"
        # echo "$octaveBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        # $bashPath = $octaveBin -replace '\\', '/' -replace '^C:', '/c'
        # echo "$bashPath" >> $env:GITHUB_PATH

    - name: Install flatpak and octave via flatpak (ubuntu-flatpak)
      if: inputs.install-type == 'ubuntu-flatpak'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y flatpak dbus-x11
        sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
        sudo flatpak install -y --noninteractive flathub org.octave.Octave

    - name: Verify octave install
      shell: bash
      run: |
        if [ "${{ inputs.install-type }}" == "ubuntu-flatpak" ]; then
          flatpak run org.octave.Octave --version
        else
          octave --version
        fi
