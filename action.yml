name: Install Octave
description: Installs Octave for the given platform type.

inputs:
  install-type:
    description: 'Platform install type: ubuntu, macos, windows, ubuntu-flatpak, or ubuntu-snap'
    required: true

runs:
  using: composite
  steps:
    - name: Set up apt cache dir (ubuntu)
      if: startsWith(inputs.install-type, 'ubuntu')
      shell: bash
      run: |
        mkdir -p ~/apt-cache
        echo "OS_VERSION=$(. /etc/os-release && echo $VERSION_ID)" >> $GITHUB_ENV

    - name: Cache apt packages (ubuntu)
      if: startsWith(inputs.install-type, 'ubuntu')
      id: cache-apt
      uses: actions/cache@v4
      with:
        path: ~/apt-cache
        key: apt-${{ inputs.install-type }}-${{ env.OS_VERSION }}

    - name: Restore apt packages from cache (ubuntu)
      if: startsWith(inputs.install-type, 'ubuntu')
      shell: bash
      run: find ~/apt-cache -name "*.deb" -exec sudo cp {} /var/cache/apt/archives/ \;

    - name: Update apt package lists (ubuntu)
      if: startsWith(inputs.install-type, 'ubuntu')
      shell: bash
      run: sudo apt-get update

    - name: Install octave (ubuntu)
      if: inputs.install-type == 'ubuntu'
      shell: bash
      run: |
        set -eu
        sudo apt-get install -y octave gnuplot

    - name: Clean apt package cache (ubuntu)
      if: startsWith(inputs.install-type, 'ubuntu')
      shell: bash
      run: |
        set -eu
        sudo apt-get autoclean
        sudo find /var/cache/apt/archives -name "*.deb" -exec cp {} ~/apt-cache/ \;
        sudo rm -f /var/cache/apt/archives/lock
        sudo rm -rf /var/cache/apt/archives/partial
  
    - name: Set up Miniconda (macos, windows)
      if: ${{ inputs.install-type == 'macos' || inputs.install-type == 'windows' }}
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        auto-activate-base: true

    - name: Get Octave version for cache key (macos, windows)
      if: ${{ inputs.install-type == 'macos' || inputs.install-type == 'windows' }}
      shell: bash
      run: |
        set -eu
        OCTAVE_VERSION=$(conda search -c conda-forge octave --json | python3 -c "import sys,json; pkgs=json.load(sys.stdin)['octave']; print(sorted(pkgs, key=lambda p: p['build_number'])[-1]['version'])")
        echo "OCTAVE_VERSION=$OCTAVE_VERSION" >> $GITHUB_ENV

    - name: Cache conda packages (macos, windows)
      if: ${{ inputs.install-type == 'macos' || inputs.install-type == 'windows' }}
      id: cache-conda-octave
      uses: actions/cache@v4
      with:
        path: ~/conda_pkgs_dir
        key: conda-octave-${{ inputs.install-type }}-${{ env.OCTAVE_VERSION }}

    - name: Install Octave via conda-forge (macos)
      if: inputs.install-type == 'macos'
      shell: bash
      run: |
        set -eu
        export CONDA_PKGS_DIRS="$HOME/conda_pkgs_dir"
        conda install -c conda-forge octave --yes

    - name: Install Octave via conda-forge (windows)
      if: inputs.install-type == 'windows'
      shell: pwsh
      run: |
        $env:CONDA_PKGS_DIRS = "$HOME/conda_pkgs_dir"
        conda install -c conda-forge octave --yes

    - name: Install flatpak and dbus-x11 (ubuntu-flatpak)
      if: inputs.install-type == 'ubuntu-flatpak'
      shell: bash
      run: |
        set -eu
        sudo apt-get install -y flatpak dbus-x11

    - name: Install octave via flatpak (ubuntu-flatpak)
      if: inputs.install-type == 'ubuntu-flatpak'
      shell: bash
      run: |
        set -eu
        sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
        sudo flatpak install -y --noninteractive flathub org.octave.Octave

    - name: Install octave via snap (ubuntu-snap)
      if: inputs.install-type == 'ubuntu-snap'
      shell: bash
      run: |
        set -eu
        sudo snap install octave --edge

    - name: Start Xvfb on linux
      shell: bash
      if: ${{ startsWith('ubuntu', inputs.install-type) }}
      run: |
        set -eu
        Xvfb :99 -screen 0 1024x768x24 &
        echo "DISPLAY=:99" >> $GITHUB_ENV

    - name: Verify octave install
      shell: bash
      run: |
        set -eu
        export EXE="octave"
        if [ "${{ inputs.install-type }}" == "ubuntu-flatpak" ]; then
          export EXE="flatpak run org.octave.Octave"
        fi
        $EXE --version
        $EXE --eval "available_graphics_toolkits"
        $EXE --eval "graphics_toolkit"
