
name: tests

on:
  push:
    branches: [ "main" ]
  pull_request:
  schedule:
    # Run weekly
    # * is a special character in YAML so you have to quote this string
    - cron:  '0 0 * * 0'

defaults:
  run:
    shell: bash -leu {0}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-linux:
    runs-on: "ubuntu-latest"
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14', '3.14t']
      fail-fast: false

    steps:
    - uses: actions/checkout@v6
    - name: Base Setup
      uses: jupyterlab/maintainer-tools/.github/actions/base-setup@93556350e3433849ea434d68e8b8f7d9e9a402a4 # v1
    - name: Install uv
      uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
    - name: Install octave
      uses: ./
      with:
        install-type: ubuntu
    - name: Install just
      uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3
    - name: Install dependencies
      run: |
        just install
        just docker-build
    - name: Run test on linux
      run: |
         uv run python -m octave_kernel.check
         xvfb-run --auto-servernum just cover
         xvfb-run --auto-servernum just test-kernel
         xvfb-run --auto-servernum just test-notebook
         uv run python -m octave_kernel install --user

  test-macos:
    runs-on: "macos-latest"
    steps:
    - uses: actions/checkout@v6
    - name: Base Setup
      uses: jupyterlab/maintainer-tools/.github/actions/base-setup@93556350e3433849ea434d68e8b8f7d9e9a402a4 # v1
    - name: Install uv
      uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
    - name: Install just
      uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6 # v2
    - name: Install octave
      uses: ./
      with:
        install-type: macos
    - name: Run unit tests on macos
      run: just test
    - name: Run kernel tests on macos
      run: just test-kernel

  test-windows:
    runs-on: "windows-latest"
    steps:
    - uses: actions/checkout@v6
    - name: Base Setup
      uses: jupyterlab/maintainer-tools/.github/actions/base-setup@93556350e3433849ea434d68e8b8f7d9e9a402a4 # v1
    - name: Install uv
      uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
    - name: Install just
      uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6 # v2
    - name: Install octave
      uses: ./
      with:
        install-type: windows
    - name: Run unit tests on windows
      run: just test
    - name: Run kernel tests on windows
      run: just test-kernel

  test-flatpak:
    runs-on: "ubuntu-latest"
    steps:
    - uses: actions/checkout@v6
    - name: Base Setup
      uses: jupyterlab/maintainer-tools/.github/actions/base-setup@93556350e3433849ea434d68e8b8f7d9e9a402a4 # v1
    - name: Install uv
      uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
    - name: Install just
      uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6 # v2
    - name: Install octave
      uses: ./
      with:
        install-type: ubuntu-flatpak
    - name: Install dependencies
      run: just install
    - name: Run tests with flatpak octave
      run: |
        dbus-run-session -- xvfb-run --auto-servernum just test
        dbus-run-session -- xvfb-run --auto-servernum just test-kernel

  make_sdist:
    name: Make SDist
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: jupyterlab/maintainer-tools/.github/actions/base-setup@93556350e3433849ea434d68e8b8f7d9e9a402a4 # v1
      - uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3
      - uses: jupyterlab/maintainer-tools/.github/actions/make-sdist@93556350e3433849ea434d68e8b8f7d9e9a402a4 # v1

  test_sdist:
    runs-on: ubuntu-latest
    needs: [make_sdist]
    name: Install from SDist and Test
    timeout-minutes: 20
    steps:
      - uses: jupyterlab/maintainer-tools/.github/actions/base-setup@93556350e3433849ea434d68e8b8f7d9e9a402a4 # v1
      - uses: jupyterlab/maintainer-tools/.github/actions/test-sdist@93556350e3433849ea434d68e8b8f7d9e9a402a4 # v1
        with:
          test_command: "jupyter kernelspec list | grep octave"

  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jupyterlab/maintainer-tools/.github/actions/base-setup@93556350e3433849ea434d68e8b8f7d9e9a402a4 # v1
      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
      - name: Install just
        uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3
      - name: Run pre-commit
        run: just pre-commit
      - name: Run typing check
        run: just typing

  check_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Base Setup
        uses: jupyterlab/maintainer-tools/.github/actions/base-setup@93556350e3433849ea434d68e8b8f7d9e9a402a4 # v1
      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
      - name: Check Release
        uses: jupyter-server/jupyter_releaser/.github/actions/check-release@3e74486d1011d24cd5e9977202fd349dece0db9c # v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  link_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jupyterlab/maintainer-tools/.github/actions/base-setup@93556350e3433849ea434d68e8b8f7d9e9a402a4 # v1
      - uses: jupyterlab/maintainer-tools/.github/actions/check-links@93556350e3433849ea434d68e8b8f7d9e9a402a4 # v1

  tests_check: # This job does nothing and is only used for the branch protection
    if: always()
    needs:
      - test-linux
      - test-macos
      - test-windows
      - test-flatpak
      - make_sdist
      - test_sdist
      - static
      - check_release
      - link_check
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          jobs: ${{ toJSON(needs) }}
