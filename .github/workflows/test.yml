
name: tests

on:
  push:
    branches: [ "main" ]
  pull_request:
  schedule:
    # Run weekly
    # * is a special character in YAML so you have to quote this string
    - cron:  '0 0 * * 0'

defaults:
  run:
    shell: bash -leu {0}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-linux:
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ${{ fromJSON(needs.build.outputs.supported_python_classifiers_json_array) }}
        include:
          - os: ubuntu-22.04
            python-version: '3.11'
      fail-fast: false

    steps:
    - uses: actions/checkout@v6
    - name: Base Setup
      uses: calysto/maintainer_tools/actions/base-setup@v1
      with:
        python-version: ${{ matrix.python-version }}
    - name: Setup octave
      uses: ./
      with:
        install-type: ubuntu
    - name: Run test on linux
      run: |
         poetry run python -m octave_kernel.check
         just test
         just test-kernel
         just test-notebook
         poetry run python -m octave_kernel install --user

  test-other-systems:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
        include:
          - os: macos-latest
            install-type: macos
          - os: windows-latest
            install-type: windows
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - name: Base Setup
      uses: calysto/maintainer_tools/actions/base-setup@v1
    - name: Setup octave
      uses: ./
      with:
        install-type: ${{ matrix.install-type }}
    - name: Run tests
      run: |
        just cover
        just test-kernel
    - name: Upload coverage to Codecov
      if: always() && matrix.os == 'windows-latest' && (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork || github.event.pull_request.base.repo.full_name == 'Calysto/octave_kernel') && (github.event_name != 'schedule' || github.repository == 'Calysto/octave_kernel')
      uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: coverage.xml
        flags: windows
        fail_ci_if_error: false

  test-other-ubuntu:
    needs: build
    strategy:
      matrix:
        install-type: [ubuntu-flatpak, ubuntu-snap]
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Base Setup
      uses: calysto/maintainer_tools/actions/base-setup@v1
    - name: Setup octave
      uses: ./
      with:
        install-type: ${{ matrix.install-type }}
    - name: Run tests
      run: |
        just test
        just test-kernel
    - name: Test notebook
      if: ${{ matrix.install-type != 'ubuntu-flatpak' }}
      run: just test-notebook

  cover-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Base Setup
      uses: calysto/maintainer_tools/actions/base-setup@v1
    - name: Setup octave
      uses: ./
      with:
        install-type: ubuntu
    - name: Run coverage
      run: just cover
    - name: Upload coverage to Codecov
      if: always() && (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork || github.event.pull_request.base.repo.full_name == 'Calysto/octave_kernel') && (github.event_name != 'schedule' || github.repository == 'Calysto/octave_kernel')
      uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: coverage.xml
        flags: linux
        fail_ci_if_error: false

  build:
    name: Build and Inspect Package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      supported_python_classifiers_json_array: ${{ steps.baipp.outputs.supported_python_classifiers_json_array }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: calysto/maintainer_tools/actions/base-setup@v1
      - uses: hynek/build-and-inspect-python-package@efb823f52190ad02594531168b7a2d5790e66516 # v2.14.0
        id: baipp
        with:
          include-free-threaded: "true"

  test_sdist:
    runs-on: ubuntu-latest
    needs: [build]
    name: Install from SDist and Test
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: calysto/maintainer_tools/actions/base-setup@v1
      - name: Setup octave
        uses: ./
        with:
          install-type: ubuntu
      - uses: calysto/maintainer_tools/actions/test-sdist@v1
        with:
          test_command: "jupyter kernelspec list | grep octave"

  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: calysto/maintainer_tools/actions/base-setup@v1
      - name: Run pre-commit
        run: just pre-commit --hook-stage=manual
      - name: Run typing check
        run: just typing

  benchmark:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        persist-credentials: false
    - name: Base Setup
      uses: calysto/maintainer_tools/actions/base-setup@v1
      with:
        python-version: '3.11'
    - name: Setup octave
      uses: ./
      with:
        install-type: ubuntu
    - name: Run benchmark comparison
      run: just benchmark-compare

  test_release:
    name: Test Release (Dry Run)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: calysto/maintainer_tools/actions/base-setup@v1
      - uses: calysto/maintainer_tools/actions/release@v1
        with:
          version: patch
          dry_run: "true"
          ref: ${{ github.head_ref }}

  docker-build:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
    - uses: actions/checkout@v6
    - uses: calysto/maintainer_tools/actions/base-setup@v1
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
    - name: Build Docker image
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
      with:
        context: .
        push: false
        load: true
        tags: calysto/octave-notebook:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
    - name: Test Docker image
      run: just test-docker

  tests_check: # This job does nothing and is only used for the branch protection
    if: always()
    needs:
      - test-linux
      - test-other-systems
      - test-other-ubuntu
      - cover-linux
      - build
      - test_sdist
      - static
      - benchmark
      - docker-build
      - test_release
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          allowed-skips: benchmark,test_release
          jobs: ${{ toJSON(needs) }}
