
name: tests

on:
  push:
    branches: [ "main" ]
  pull_request:
  schedule:
    # Run weekly
    # * is a special character in YAML so you have to quote this string
    - cron:  '0 0 * * 0'

defaults:
  run:
    shell: bash -leu {0}

permissions:
  contents: read

