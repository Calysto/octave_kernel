  test-macos:
    runs-on: "macos-latest"
    steps:
    - uses: actions/checkout@v6
    - name: Base Setup
      uses: jupyterlab/maintainer-tools/.github/actions/base-setup@v1
    - name: Install uv
      uses: astral-sh/setup-uv@v4
    - name: Install just
      uses: extractions/setup-just@v2
    - name: Install octave
      run: brew install octave
    - name: Run test on macos
      run: just test

  test-windows:
    runs-on: "windows-latest"
    defaults:
      run:
        shell: pwsh
    steps:
    - uses: actions/checkout@v6
    - name: Base Setup
      uses: jupyterlab/maintainer-tools/.github/actions/base-setup@v1
    - name: Install uv
      uses: astral-sh/setup-uv@v4
    - name: Install just
      uses: extractions/setup-just@v2
    - name: Install octave
      run: choco install octave --no-progress -y
    - name: Add octave to PATH
      shell: bash
      run: |
        ls "/c/Program Files/"
        octave_bin=$(ls -d "/c/Program Files/GNU Octave"*/mingw64/bin)
        echo "$octave_bin" >> "$GITHUB_PATH"
    - name: Verify octave
      shell: bash
      run: octave --version
    - name: Run test on windows
      run: just test

  test-flatpak:
    runs-on: "ubuntu-latest"
    steps:
    - uses: actions/checkout@v6
    - name: Base Setup
      uses: jupyterlab/maintainer-tools/.github/actions/base-setup@v1
    - name: Install uv
      uses: astral-sh/setup-uv@v4
    - name: Install just
      uses: extractions/setup-just@v2
    - name: Install flatpak and octave via flatpak
      run: |
        sudo apt-get update
        sudo apt-get install -y flatpak dbus-x11
        sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
        sudo flatpak install -y --noninteractive flathub org.octave.Octave
    - name: Install dependencies
      run: just install
    - name: Run test with flatpak octave
      run: |
        uv run python -m octave_kernel.check
        dbus-run-session -- xvfb-run --auto-servernum just test

  make_sdist:
    name: Make SDist
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: jupyterlab/maintainer-tools/.github/actions/base-setup@v1
      - uses: extractions/setup-just@v2
      - uses: jupyterlab/maintainer-tools/.github/actions/make-sdist@v1

  test_sdist:
    runs-on: ubuntu-latest
    needs: [make_sdist]
    name: Install from SDist and Test
    timeout-minutes: 20
    steps:
      - uses: jupyterlab/maintainer-tools/.github/actions/base-setup@v1
      - uses: jupyterlab/maintainer-tools/.github/actions/test-sdist@v1
        with:
          test_command: "jupyter kernelspec list | grep octave"

  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jupyterlab/maintainer-tools/.github/actions/base-setup@v1
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install just
        uses: extractions/setup-just@v2
      - name: Run pre-commit
        run: just pre-commit
      - name: Run typing check
        run: just typing

  check_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Base Setup
        uses: jupyterlab/maintainer-tools/.github/actions/base-setup@v1
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Check Release
        uses: jupyter-server/jupyter_releaser/.github/actions/check-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  link_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jupyterlab/maintainer-tools/.github/actions/base-setup@v1
      - uses: jupyterlab/maintainer-tools/.github/actions/check-links@v1

